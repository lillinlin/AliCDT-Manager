services:
  aliyun-guard:
    image: ghcr.io/YOUR_GITHUB_USERNAME/aliyun-guard:latest
    container_name: aliyun-guard
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - SECRET_KEY=change-this-to-a-random-string
    dns:
      - 8.8.8.8
      - 1.1.1.1
